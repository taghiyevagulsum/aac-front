<html>
  <head>
    <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin="" />
    <link
      rel="stylesheet"
      as="style"
      onload="this.rel='stylesheet'"
      href="https://fonts.googleapis.com/css2?display=swap&amp;family=Inter%3Awght%40400%3B500%3B700%3B900&amp;family=Noto+Sans%3Awght%40400%3B500%3B700%3B900"
    />

    <title>Stitch Design</title>
    <link rel="icon" type="image/x-icon" href="data:image/x-icon;base64," />

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="js/auth-service.js"></script>
  </head>
  <body>
    <div class="relative flex size-full min-h-screen flex-col bg-white group/design-root overflow-x-hidden" style='font-family: Inter, "Noto Sans", sans-serif;'>
      <div class="layout-container flex h-full grow flex-col">
        <header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-b-[#f0f2f5] px-10 py-3">
          <div class="flex items-center gap-4 text-[#111518]">
            <div class="size-4">
              <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path
                  d="M36.7273 44C33.9891 44 31.6043 39.8386 30.3636 33.69C29.123 39.8386 26.7382 44 24 44C21.2618 44 18.877 39.8386 17.6364 33.69C16.3957 39.8386 14.0109 44 11.2727 44C7.25611 44 4 35.0457 4 24C4 12.9543 7.25611 4 11.2727 4C14.0109 4 16.3957 8.16144 17.6364 14.31C18.877 8.16144 21.2618 4 24 4C26.7382 4 29.123 8.16144 30.3636 14.31C31.6043 8.16144 33.9891 4 36.7273 4C40.7439 4 44 12.9543 44 24C44 35.0457 40.7439 44 36.7273 44Z"
                  fill="currentColor"
                ></path>
              </svg>
            </div>
            <h2 class="text-[#111518] text-lg font-bold leading-tight tracking-[-0.015em]">SpeakGrid</h2>
          </div>
        </header>
        <div class="px-40 flex flex-1 justify-center py-5">
          <div class="layout-content-container flex flex-col w-[512px] max-w-[512px] py-5 max-w-[960px] flex-1">
            <h2 class="text-[#111518] tracking-light text-[28px] font-bold leading-tight px-4 text-center pb-3 pt-5">Create Your SpeakGrid Account</h2>
            <form id="signupForm" class="space-y-4">
              <div class="flex max-w-[480px] flex-wrap items-end gap-4 px-4 py-3">
                <label class="flex flex-col min-w-40 flex-1">
                  <input
                    id="name"
                    name="name"
                    type="text"
                    placeholder="Your Name"
                    class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-[#111518] focus:outline-0 focus:ring-0 border border-[#dbe1e6] bg-white focus:border-[#dbe1e6] h-14 placeholder:text-[#60768a] p-[15px] text-base font-normal leading-normal"
                    required
                  />
                </label>
              </div>
              <div class="flex max-w-[480px] flex-wrap items-end gap-4 px-4 py-3">
                <label class="flex flex-col min-w-40 flex-1">
                  <input
                    id="email"
                    name="email"
                    type="email"
                    placeholder="Email"
                    class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-[#111518] focus:outline-0 focus:ring-0 border border-[#dbe1e6] bg-white focus:border-[#dbe1e6] h-14 placeholder:text-[#60768a] p-[15px] text-base font-normal leading-normal"
                    required
                  />
                </label>
              </div>
              <div class="flex max-w-[480px] flex-wrap items-end gap-4 px-4 py-3">
                <label class="flex flex-col min-w-40 flex-1">
                  <input
                    id="password"
                    name="password"
                    type="password"
                    placeholder="Password"
                    class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-[#111518] focus:outline-0 focus:ring-0 border border-[#dbe1e6] bg-white focus:border-[#dbe1e6] h-14 placeholder:text-[#60768a] p-[15px] text-base font-normal leading-normal"
                    required
                    minlength="6"
                  />
                </label>
              </div>
              <div class="flex px-4 py-3">
                <button
                  type="submit"
                  id="signupBtn"
                  class="flex min-w-[84px] max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-full h-12 px-5 flex-1 bg-[#0b80ee] text-white text-base font-bold leading-normal tracking-[0.015em] hover:bg-[#0a6fd8] transition-colors"
                >
                  <span class="truncate">Sign Up</span>
                </button>
              </div>
              <div id="errorMessage" class="hidden px-4 text-red-500 text-sm text-center"></div>
            </form>
            <p class="text-[#60768a] text-sm font-normal leading-normal pb-3 pt-1 px-4 text-center">
              <a href="login.html" class="underline hover:text-[#111518] transition-colors">Already have an account? Login</a>
            </p>
          </div>
        </div>
      </div>
    </div>

    <!-- Load JavaScript services -->
    <script src="js/config.js"></script>
    <script src="js/vocabulary-service.js"></script>
    <script src="js/category-service.js"></script>
    <script src="js/user-service.js"></script>
    <script src="js/upload-page.js"></script>
    <script src="js/edit-page.js"></script>
    
    <script>
      // Signup page functionality
      document.addEventListener('DOMContentLoaded', function() {
        const signupForm = document.getElementById('signupForm');
        const signupBtn = document.getElementById('signupBtn');
        const errorMessage = document.getElementById('errorMessage');

        // Check if user is already logged in
        if (authService.isLoggedIn()) {
          window.location.href = 'index.html';
          return;
        }

        signupForm.addEventListener('submit', async function(e) {
          e.preventDefault();
          
          const name = document.getElementById('name').value.trim();
          const email = document.getElementById('email').value.trim();
          const password = document.getElementById('password').value;

          // Validate inputs
          if (!userService.validateName(name)) {
            errorMessage.textContent = 'Please enter a valid name (2-50 characters)';
            errorMessage.classList.remove('hidden');
            return;
          }

          if (!userService.validateEmail(email)) {
            errorMessage.textContent = 'Please enter a valid email address';
            errorMessage.classList.remove('hidden');
            return;
          }

          if (password.length < 6) {
            errorMessage.textContent = 'Password must be at least 6 characters long';
            errorMessage.classList.remove('hidden');
            return;
          }

          // Show loading state
          signupBtn.disabled = true;
          signupBtn.innerHTML = '<span class="truncate">Creating Account...</span>';
          errorMessage.classList.add('hidden');

          try {
            const result = await authService.signup(name, email, password);
            
            if (result.success) {
              // Redirect to main page
              window.location.href = 'index.html';
            } else {
              // Show error message
              errorMessage.textContent = result.error || 'Signup failed. Please try again.';
              errorMessage.classList.remove('hidden');
            }
          } catch (error) {
            errorMessage.textContent = 'An error occurred. Please try again.';
            errorMessage.classList.remove('hidden');
          } finally {
            // Reset button state
            signupBtn.disabled = false;
            signupBtn.innerHTML = '<span class="truncate">Sign Up</span>';
          }
        });
      });
    </script>
  </body>
</html>
