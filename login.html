<html>
  <head>
    <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin="" />
    <link
      rel="stylesheet"
      as="style"
      onload="this.rel='stylesheet'"
      href="https://fonts.googleapis.com/css2?display=swap&amp;family=Inter%3Awght%40400%3B500%3B700%3B900&amp;family=Noto+Sans%3Awght%40400%3B500%3B700%3B900"
    />

    <title>Stitch Design</title>
    <link rel="icon" type="image/x-icon" href="data:image/x-icon;base64," />

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  </head>
  <body>
    <div class="relative flex size-full min-h-screen flex-col bg-white group/design-root overflow-x-hidden" style='font-family: Inter, "Noto Sans", sans-serif;'>
      <div class="layout-container flex h-full grow flex-col">
        <div class="px-40 flex flex-1 justify-center py-5">
          <div class="layout-content-container flex flex-col w-[512px] max-w-[512px] py-5 max-w-[960px] flex-1">
            <h2 class="text-[#111518] tracking-light text-[28px] font-bold leading-tight px-4 text-center pb-3 pt-5">Login to SpeakGrid</h2>
            <form id="loginForm" class="space-y-4">
              <div class="flex max-w-[480px] flex-wrap items-end gap-4 px-4 py-3">
                <label class="flex flex-col min-w-40 flex-1">
                  <p class="text-[#111518] text-base font-medium leading-normal pb-2">Email</p>
                  <input
                    id="email"
                    name="email"
                    type="email"
                    placeholder="Enter your email"
                    class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-[#111518] focus:outline-0 focus:ring-0 border border-[#dbe1e6] bg-white focus:border-[#dbe1e6] h-14 placeholder:text-[#60768a] p-[15px] text-base font-normal leading-normal"
                    required
                  />
                </label>
              </div>
              <div class="flex max-w-[480px] flex-wrap items-end gap-4 px-4 py-3">
                <label class="flex flex-col min-w-40 flex-1">
                  <p class="text-[#111518] text-base font-medium leading-normal pb-2">Password</p>
                  <input
                    id="password"
                    name="password"
                    type="password"
                    placeholder="Enter your password"
                    class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-[#111518] focus:outline-0 focus:ring-0 border border-[#dbe1e6] bg-white focus:border-[#dbe1e6] h-14 placeholder:text-[#60768a] p-[15px] text-base font-normal leading-normal"
                    required
                  />
                </label>
              </div>
              <div class="flex px-4 py-3">
                <button
                  type="submit"
                  id="loginBtn"
                  class="flex min-w-[84px] max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-full h-10 px-4 flex-1 bg-[#0b80ee] text-white text-sm font-bold leading-normal tracking-[0.015em] hover:bg-[#0a6fd8] transition-colors"
                >
                  <span class="truncate">Login</span>
                </button>
              </div>
              <div id="errorMessage" class="hidden px-4 text-red-500 text-sm text-center"></div>
            </form>
            <p class="text-[#60768a] text-sm font-normal leading-normal pb-3 pt-1 px-4 text-center">
              <a href="signup.html" class="underline hover:text-[#111518] transition-colors">Don't have an account? Sign Up</a>
            </p>
          </div>
        </div>
      </div>
    </div>

    <!-- Load JavaScript services -->
    <script src="js/config.js"></script>
    <script src="js/auth-service.js"></script>
    <script src="js/user-service.js"></script>
    
    <script>
      // Login page functionality
      document.addEventListener('DOMContentLoaded', function() {
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const errorMessage = document.getElementById('errorMessage');

        // Check if user is already logged in
        if (authService.isLoggedIn()) {
          window.location.href = 'index.html';
          return;
        }

        loginForm.addEventListener('submit', async function(e) {
          e.preventDefault();
          
          const email = document.getElementById('email').value;
          const password = document.getElementById('password').value;

          // Show loading state
          loginBtn.disabled = true;
          loginBtn.innerHTML = '<span class="truncate">Logging in...</span>';
          errorMessage.classList.add('hidden');

          try {
            const result = await authService.login(email, password);
            
            if (result.success) {
              // Redirect to main page
              window.location.href = 'index.html';
            } else {
              // Show error message
              errorMessage.textContent = result.error || 'Login failed. Please try again.';
              errorMessage.classList.remove('hidden');
            }
          } catch (error) {
            errorMessage.textContent = 'An error occurred. Please try again.';
            errorMessage.classList.remove('hidden');
          } finally {
            // Reset button state
            loginBtn.disabled = false;
            loginBtn.innerHTML = '<span class="truncate">Login</span>';
          }
        });
      });
    </script>
  </body>
</html>
